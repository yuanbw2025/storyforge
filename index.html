    <meta charset="UTF-8" />

    <title>StoryForge / 故事熔炉</title>
    <script>
      /*
       * 浏览器兼容 polyfill —— 必须最先于模块包执行。
       * 部分老内核（微信/QQ 内置浏览器、老安卓 WebView、Safari < 15.4）缺少 ES2023 数组方法，
       * 而 TipTap/ProseMirror 等依赖会调用 Array.prototype.findLast / findLastIndex，
       * 导致用户「点章节就报错：transactions.findLast is not a function」。
       * 全部特性检测，只在缺失时补，绝不覆盖原生实现。
       */
      (function () {
        function def(name, fn) {
          if (typeof Array.prototype[name] !== 'function') {
            Object.defineProperty(Array.prototype, name, { value: fn, writable: true, configurable: true });
          }
        }
        def('findLast', function (cb, thisArg) {
          for (var i = this.length - 1; i >= 0; i--) {
            if (cb.call(thisArg, this[i], i, this)) return this[i];
          }
          return undefined;
        });
        def('findLastIndex', function (cb, thisArg) {
          for (var i = this.length - 1; i >= 0; i--) {
            if (cb.call(thisArg, this[i], i, this)) return i;
          }
          return -1;
        });
        def('at', function (n) {
          n = Math.trunc(n) || 0;
          if (n < 0) n += this.length;
          return (n < 0 || n >= this.length) ? undefined : this[n];
        });
      })();
    </script>
    <script>
      /*
       * CF-1: 本地 .bat / .exe 用户在 localhost / 127.0.0.1 常因历史遗留的 service worker
       * 缓存了旧导航回退 → 打开时提示「127.0.0.1 重定向次数过多 (ERR_TOO_MANY_REDIRECTS)」。
       * 本地运行不需要 PWA / 离线缓存，页面一加载就注销 SW + 清 Cache Storage（workbox 运行时缓存）。
       * ⚠️ 数据红线：只清 service worker 与 Cache Storage，绝不触碰 IndexedDB / localStorage
       *   （用户的小说作品与 API 配置全在 IndexedDB / localStorage，必须原样保留）。
       * 只在 localhost / 127.0.0.1 执行，不影响线上部署（Vercel）用户想要的正常 PWA。
       */
      (function () {
        var h = location.hostname;
        if (h !== 'localhost' && h !== '127.0.0.1' && h !== '[::1]') return;
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
              .catch(function () {});
          }
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        } catch (e) { /* 本地自愈失败不影响运行 */ }
      })();
    </script>
